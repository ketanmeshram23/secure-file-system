<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureVault — Shared File</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="bg-mesh" aria-hidden="true"></div>
<div id="toast-container"></div>

<div class="page-auth">
  <div class="glass-card share-card fade-up">

    <!-- Logo -->
    <div class="logomark">
      <div class="logomark-icon">🔗</div>
      <div>
        <div class="logomark-name">SecureVault</div>
        <div class="logomark-tagline">Shared File Access</div>
      </div>
    </div>

    <!-- Loading -->
    <div id="state-loading" style="text-align:center;padding:2.5rem 0;">
      <div class="spinner spinner-lg" style="color:var(--indigo);margin:0 auto;"></div>
      <div style="margin-top:1rem;font-size:.82rem;color:var(--text-secondary);">Verifying share link…</div>
    </div>

    <!-- Error -->
    <div id="state-error" style="display:none;">
      <div style="text-align:center;padding:1.5rem 0 1rem;">
        <div style="font-size:2.5rem;margin-bottom:.8rem;">🔒</div>
        <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text-primary);margin-bottom:.5rem;">
          Link Unavailable
        </div>
        <div class="alert alert-error show" style="text-align:left;">
          <span>⛔</span>
          <span id="error-message">This share link is invalid or has expired.</span>
        </div>
        <a href="/" style="display:inline-block;margin-top:1rem;font-size:.82rem;color:var(--indigo-bright);">
          ← Go to SecureVault
        </a>
      </div>
    </div>

    <!-- Download Form -->
    <div id="state-download" style="display:none;">

      <!-- File preview block -->
      <div class="file-preview-block">
        <div class="file-preview-icon" id="share-file-type-icon">📄</div>
        <div>
          <div class="file-preview-name" id="share-filename">—</div>
          <div class="file-preview-meta">
            <span id="share-filesize">—</span>
          </div>
          <div class="expiry-note" id="share-expiry-note">
            ⏳ <span id="share-expiry">—</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Share Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input class="form-input" type="password" id="share-pw-input"
                 placeholder="Enter password to unlock"
                 onkeydown="if(event.key==='Enter') downloadSharedFile()" />
        </div>
      </div>

      <button class="btn btn-primary" onclick="downloadSharedFile()" id="btn-dl">
        ↓ &nbsp;Decrypt &amp; Download
      </button>

      <div class="alert" id="share-dl-alert"></div>

      <div style="text-align:center;margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid var(--border);">
        <a href="/" style="font-size:.78rem;color:var(--text-muted);">
          Powered by <span style="color:var(--indigo-bright);font-weight:600;">SecureVault</span>
        </a>
      </div>

    </div>

  </div>
</div>

<script src="/js/share.js"></script>
</body>
</html>
